<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title>Admin Panel - English Course</title>
    <link href="img/e4sp_logo.png" rel="icon" type="image/png">
    <link href="css/style.css?v=20260209-6" rel="stylesheet">
    <link href="css/auth.css?v=20260423-1" rel="stylesheet">
    <link href="css/admin.css?v=20260423-1" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body class="auth-loading admin-page">
    <div class="auth-boot-loader" id="adminBootLoader" role="status" aria-live="polite" aria-label="Loading">
      <div class="auth-boot-spinner" aria-hidden="true"></div>
    </div>

    <main class="admin-main" role="main">
      <section class="module-card admin-shell">
        <div class="module-top">
          <div class="module-focus-title">English in Tourism</div>
          <div class="module-focus-sub">Admin Panel</div>
        </div>

        <section class="auth-card admin-auth-card" id="adminLoginCard" aria-label="Admin login">
          <div class="auth-head">
            <h3 class="auth-title">Admin Login</h3>
          </div>
          <form class="auth-form" id="adminLoginForm" novalidate>
            <label class="auth-label" for="adminUsername">Username</label>
            <input class="auth-input" id="adminUsername" name="username" type="text" autocomplete="username" required>
            <label class="auth-label" for="adminPassword">Password</label>
            <input class="auth-input" id="adminPassword" name="password" type="password" autocomplete="current-password" required>
            <button class="auth-submit" type="submit">Login</button>
          </form>
          <div class="auth-dev-creds">
            <p class="auth-dev-creds-title">Admin credentials</p>
            <ul class="auth-dev-creds-list">
              <li>Username: admin123</li>
              <li>Password: admin123</li>
            </ul>
          </div>
          <p class="auth-feedback" id="adminFeedback" aria-live="polite"></p>
        </section>

        <section class="auth-card admin-dashboard" id="adminDashboard" aria-label="Candidates progress" hidden>
          <div class="admin-dashboard-head">
            <div>
              <h3 class="auth-title">Examinees Progress</h3>
              <p class="auth-sub" id="adminSignedIn"></p>
            </div>
            <button class="auth-logout" id="adminLogoutBtn" type="button">Logout</button>
          </div>

          <div class="admin-controls">
            <label class="auth-label" for="totalTestHoursInput">Total test hours</label>
            <input class="auth-input admin-hours-input" id="totalTestHoursInput" type="number" min="0.1" step="0.1" value="2">
            <button class="auth-submit admin-refresh-btn" id="adminRefreshBtn" type="button">Refresh</button>
          </div>

          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Examinee</th>
                  <th>Progress</th>
                  <th>Time Completion</th>
                </tr>
              </thead>
              <tbody id="adminCandidatesBody"></tbody>
            </table>
            <p class="admin-empty" id="adminEmpty" hidden>No examinees found yet.</p>
          </div>
        </section>
      </section>
    </main>

    <script src="js/admin.js?v=20260423-1"></script>
  </body>
</html>
